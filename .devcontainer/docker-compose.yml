version: "3.8"
services:
  app:
    image: mcr.microsoft.com/devcontainers/python:3.12
    volumes:
      - ..:/workspace:cached
    command: sleep infinity
    environment:
      - DATABASE_URL=postgresql://claims:claims@db:5432/claimsdb
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: claims
      POSTGRES_PASSWORD: claims
      POSTGRES_DB: claimsdb
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
